<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Rain</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oleo+Script:wght@400;700&family=Noto+Serif:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
            background-color: #ffed00;
            color: #111;
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Space Background Container */
        .space-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Stars */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Shooting Stars */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
            animation: shoot 3s linear infinite;
        }

        @keyframes shoot {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                transform: translateX(-300px) translateY(300px);
                opacity: 0;
            }
        }

        /* Orbital Paths */
        .orbit {
            position: absolute;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Planets on orbits */
        .planet {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* Hero Section - 圖片和標題並排 */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        /* Hero Image */
        .hero-image {
            max-width: 250px;
            width: 100%;
            height: auto;
        }

        /* Right Content */
        .hero-content {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }

        /* Title Section */
        .title-box {
            display: inline-block;
            padding: 2px 15px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #0051ba;
            letter-spacing: -1px;
            font-family: "Oleo Script", system-ui;
        }

        /* Tagline */
        .tagline {
            font-size: 1.1rem;
            color: #4a4a4a;
            max-width: 450px;
            margin: 0 auto 0px;
            line-height: 1.6;
            font-family: "Noto Serif", serif;
            font-weight: 400;
        }

        /* Links Section */
        .links-list {
            max-width: 600px;
            margin: 0 auto;
        }

        .link-item {
            margin-bottom: 30px;
            font-size: 1.1rem;
            color: #4a4a4a;
        }

        .link-item a {
            color: #4a4a4a;
            text-decoration: none;
            font-weight: 400;
            border-bottom: 2px solid transparent;
            transition: border-bottom 0.2s ease;
        }

        .link-item a:hover {
            border-bottom: 2px solid #4a4a4a;
        }

        .link-item.email {
            color: #4a4a4a;
            font-weight: 400;
        }

        /* Social Icons Section */
        .social-icons {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 18px 35px;
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            border: 3px solid #111;
            text-decoration: none;
            color: #111;
            font-size: 1rem;
            font-weight: 400;
            transition: all 0.2s ease;
            box-shadow: 6px 6px 0 #111;
            font-family: "Noto Serif", serif;
        }

        .social-icon:hover {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0 #111;
        }

        .social-icon:nth-child(1) {
            background-color: #0051ba;
            color: #ffffff;
        }

        .social-icon:nth-child(2) {
            background-color: #0051ba;
            color: #ffffff;
        }

        .social-icon:nth-child(3) {
            background-color: #0051ba;
            color: #ffffff;
        }

        /* Footer */
        footer {
            margin-top: 50px;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 40px 15px;
            }

            .hero-section {
                flex-direction: column;
                gap: 30px;
            }

            .hero-content {
                text-align: center;
            }

            .hero-image {
                max-width: 250px;
            }

            h1 {
                font-size: 2rem;
            }

            .title-box {
                padding: 12px 30px;
            }

            .tagline {
                font-size: 1rem;
                margin-bottom: 40px;
            }

            .link-item {
                font-size: 1.1rem;
                margin-bottom: 25px;
            }

            .social-icon {
                width: 100%;
                max-width: none;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }

            .title-box {
                padding: 10px 25px;
            }

            .tagline {
                font-size: 0.95rem;
            }

            .link-item {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Space Background -->
    <div class="space-background" id="spaceBackground"></div>

    <div class="container">
        <div class="hero-section">
            <!-- Hero Image -->
            <img src="picture.png" alt="Love & Peace" class="hero-image">

            <!-- Hero Content -->
            <div class="hero-content">
                <!-- Title -->
                <div class="title-box">
                    <h1>Hi! I'm Rain!</h1>
                </div>

                <!-- Tagline -->
                <p class="tagline">
                   Exploring pop culture through the lens of space planning, and turning ideas into small projects. Connect: skalday777★gmail.com(★→@)
                </p>
            </div>
        </div>

        <!-- Social Icons -->
        <div class="social-icons">
            <a href="https://github.com/skalday" class="social-icon" target="_blank">
                ★ Github: My Toybox
            </a>
            <a href="https://skalday777.substack.com/" class="social-icon" target="_blank">
                ★ Substack: My Observation
            </a>
            <a href="https://instagram.com/lainzzz000" class="social-icon" target="_blank">
               ★ Instagram: My Daily Life
            </a>
        </div>

        <footer>
            <p>© 2026 Skal Day</p>
        </footer>
    </div>

    <script>
        // Create stars
        function createStars() {
            const spaceBackground = document.getElementById('spaceBackground');
            const numStars = 200;
            
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Random position
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                // Random size
                const size = Math.random() * 5 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                // Random animation delay
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                
                spaceBackground.appendChild(star);
            }
        }

        // Create shooting stars
        function createShootingStars() {
            const spaceBackground = document.getElementById('spaceBackground');
            
            setInterval(() => {
                const shootingStar = document.createElement('div');
                shootingStar.className = 'shooting-star';
                
                // Random starting position (top area)
                shootingStar.style.left = Math.random() * 100 + '%';
                shootingStar.style.top = Math.random() * 30 + '%';
                
                spaceBackground.appendChild(shootingStar);
                
                // Remove after animation
                setTimeout(() => {
                    shootingStar.remove();
                }, 3000);
            }, 4000); // New shooting star every 4 seconds
        }

        // Create orbital paths with planets
        function createOrbits() {
            const spaceBackground = document.getElementById('spaceBackground');
            const orbits = [
                { size: 150, duration: 15, planetSize: 4 },
                { size: 250, duration: 25, planetSize: 6 },
                { size: 350, duration: 35, planetSize: 5 }
            ];
            
            orbits.forEach((orbitData, index) => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.style.width = orbitData.size + 'px';
                orbit.style.height = orbitData.size + 'px';
                orbit.style.left = 'calc(50% - ' + (orbitData.size / 2) + 'px)';
                orbit.style.top = 'calc(50% - ' + (orbitData.size / 2) + 'px)';
                orbit.style.animationDuration = orbitData.duration + 's';
                orbit.style.animationDelay = index * 5 + 's';
                
                // Create planet on orbit
                const planet = document.createElement('div');
                planet.className = 'planet';
                planet.style.width = orbitData.planetSize + 'px';
                planet.style.height = orbitData.planetSize + 'px';
                planet.style.top = '0';
                planet.style.left = 'calc(50% - ' + (orbitData.planetSize / 2) + 'px)';
                
                orbit.appendChild(planet);
                spaceBackground.appendChild(orbit);
            });
        }

        // Initialize all animations
        window.addEventListener('DOMContentLoaded', () => {
            createStars();
            createShootingStars();
            createOrbits();
        });
    </script>
</body>
</html>
